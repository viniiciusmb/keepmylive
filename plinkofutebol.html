<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plinko dos Gigantes ⚽</title>
<style>
  :root{
    --pitch-1:#0b6e2f;
    --pitch-2:#0f8a3c;
    --panel-bg: rgba(4,20,10,0.6);
    --panel-border: rgba(255,255,255,0.14);
    --gold:#ffd76a;
    --badge-bg:#12244a;
    --badge-text:#ffe07a;
    --text:#f4fbf3;
    --text-dim: rgba(244,251,243,0.7);
    --pink:#ff6ec7;
    --blue:#4fd1ff;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0; min-height:100%;
    background: repeating-linear-gradient(180deg, var(--pitch-1) 0px, var(--pitch-1) 60px, var(--pitch-2) 60px, var(--pitch-2) 120px);
    color:var(--text);
    font-family: system-ui, "Segoe UI", Arial, sans-serif;
    overflow-x:hidden;
  }

  .pitch-circle{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    width:min(85vw,640px); height:min(85vw,640px);
    border:2px solid rgba(255,255,255,0.16); border-radius:50%;
    pointer-events:none; z-index:0;
  }
  .pitch-halfway{
    position:fixed; top:0; left:50%; width:2px; height:100%;
    background:rgba(255,255,255,0.12); z-index:0; pointer-events:none;
  }

  #particles{ position:fixed; inset:0; z-index:6; pointer-events:none; }

  .top-bar{ position:relative; z-index:2; text-align:center; padding:18px 10px 6px; }
  .title{
    font-family:"Arial Black", Impact, sans-serif;
    font-size:clamp(20px,4.2vw,32px);
    letter-spacing:1px;
    text-shadow:0 3px 12px rgba(0,0,0,0.6);
  }

  .fans-panel{
    position:fixed; top:16px; right:16px; width:200px; z-index:5;
    background:var(--panel-bg); border:1px solid var(--panel-border);
    border-radius:12px; padding:10px; backdrop-filter: blur(6px);
  }
  .fans-title{ font-size:10px; letter-spacing:2px; color:var(--gold); opacity:0.9; margin-bottom:6px; }
  .fans-list{ display:flex; flex-direction:column; gap:4px; }
  .fan-item{
    background:rgba(255,255,255,0.06); padding:5px 7px; border-radius:6px;
    font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    animation: fanIn 0.3s ease;
  }
  @keyframes fanIn{ from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);} }

  .board-wrap{
    position:relative; z-index:2;
    width:min(760px,94vw); margin:18px auto 0;
    background:var(--panel-bg); border:2px solid var(--panel-border);
    border-radius:18px; padding:10px 10px 4px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,0,0,0.35);
    backdrop-filter: blur(3px);
  }
  #plinkoCanvas{ display:block; width:100%; height:320px; }

  .slots-row{ display:flex; width:100%; padding-bottom:8px; }
  .slot{ flex:1 1 0; display:flex; flex-direction:column; align-items:center; gap:5px; min-width:0; }
  .slot-badge{
    background:var(--badge-bg); color:var(--badge-text);
    font-family:"Arial Black", Impact, sans-serif; font-size:13px;
    padding:3px 7px; border-radius:6px; min-width:20px; text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.4);
  }
  .slot-badge.pulse{ animation: badgePulse 0.5s ease; }
  @keyframes badgePulse{ 0%{transform:scale(1);} 40%{transform:scale(1.45); color:#fff;} 100%{transform:scale(1);} }
  .slot-shield{ filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); max-width:100%; height:auto; }

  .follow-toast{
    position:fixed; top:70px; left:50%; transform:translate(-50%,-14px);
    background:linear-gradient(135deg,#6affa0,#2fa876); color:#04241a;
    font-weight:800; font-size:14px; padding:9px 18px; border-radius:24px;
    opacity:0; z-index:7; pointer-events:none;
    box-shadow:0 6px 20px rgba(106,255,160,0.4);
    transition: all 0.35s ease;
  }
  .follow-toast.show{ opacity:1; transform:translate(-50%,0); }

  .test-panel{ position:fixed; bottom:16px; right:16px; z-index:10; }
  .test-toggle{
    width:38px; height:38px; border-radius:50%;
    border:1px solid var(--panel-border);
    background:rgba(10,25,15,0.8); color:var(--text);
    font-size:16px; cursor:pointer; backdrop-filter:blur(6px);
  }
  .test-buttons{
    position:absolute; bottom:46px; right:0;
    display:flex; flex-direction:column; gap:6px;
    background:rgba(6,16,10,0.92);
    border:1px solid var(--panel-border); border-radius:10px;
    padding:10px; width:200px;
    opacity:0; pointer-events:none; transform:translateY(10px);
    transition:all 0.25s ease; backdrop-filter:blur(8px);
  }
  .test-buttons.open{ opacity:1; pointer-events:auto; transform:translateY(0); }
  .test-buttons button{
    background:rgba(255,255,255,0.06); border:1px solid var(--panel-border); color:var(--text);
    padding:8px 10px; border-radius:6px; font-size:11.5px; cursor:pointer; text-align:left;
  }
  .test-buttons button:hover{ background:rgba(255,255,255,0.16); }
  .test-label{ font-size:10px; color:var(--text-dim); letter-spacing:1px; margin-bottom:2px; }
  .test-divider{ height:1px; background:var(--panel-border); margin:2px 0; }

  @media (max-width:700px){
    .fans-panel{ position:static; width:min(760px,94vw); margin:12px auto 0; }
    .fans-list{ flex-direction:row; overflow-x:auto; }
    .fan-item{ flex:0 0 auto; }
  }
  @media (max-width:480px){
    #plinkoCanvas{ height:250px; }
    .slot-badge{ font-size:11px; padding:2px 5px; }
  }
</style>
</head>

<script>
  /* =========================================================
     CONFIGURAÇÃO — lê username/key da URL, com fallback fixo
     ========================================================= */
  const params = new URLSearchParams(window.location.search);
  const USERNAME = params.get('username') || 'SEU_USERNAME_AQUI';
  const KEY = params.get('key') || 'SUA_CHAVE_AQUI';
  const WS_URL = `wss://api.interactivelive.online:8443?username=${USERNAME}&key=${KEY}`;

  /* =========================================================
     TIMES
     ========================================================= */
  const TEAMS = [
    { id:'flamengo', name:'Flamengo' },
    { id:'corinthians', name:'Corinthians' },
    { id:'sao-paulo', name:'São Paulo' },
    { id:'palmeiras', name:'Palmeiras' },
    { id:'vasco', name:'Vasco' },
    { id:'cruzeiro', name:'Cruzeiro' },
    { id:'gremio', name:'Grêmio' },
    { id:'internacional', name:'Internacional' },
    { id:'atletico-mg', name:'Atlético-MG' },
    { id:'santos', name:'Santos' }
  ];
  const SLOTS = TEAMS.length;
  const TEAM_NAME = {};
  TEAMS.forEach(t => TEAM_NAME[t.id] = t.name);

  const TEAM_ALIASES = {
    'flamengo': ['flamengo','fla'],
    'corinthians': ['corinthians','corintians','timao','cor'],
    'sao-paulo': ['sao paulo','spfc','tricolor paulista','sao'],
    'palmeiras': ['palmeiras','verdao','pal'],
    'vasco': ['vasco','vasco da gama','vas'],
    'cruzeiro': ['cruzeiro','cru','raposa'],
    'gremio': ['gremio','gre','tricolor gaucho'],
    'internacional': ['internacional','inter','int','colorado'],
    'atletico-mg': ['atletico mg','galo','cam'],
    'santos': ['santos','san','peixe']
  };

  function normalizeForWords(str){
    return (str || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }
  function normalizeForPhrase(str){
    return normalizeForWords(str).replace(/[^a-z0-9]+/g, ' ').trim();
  }
  function detectTeam(message){
    const words = new Set((normalizeForWords(message).match(/[a-z0-9]+/g)) || []);
    const phrase = normalizeForPhrase(message);
    for(const team of TEAMS){
      for(const alias of TEAM_ALIASES[team.id]){
        if(alias.includes(' ')){
          if(phrase.includes(alias)) return team.id;
        } else if(words.has(alias)){
          return team.id;
        }
      }
    }
    return null;
  }

  /* =========================================================
     DOM — geração dos slots
     ========================================================= */
  const slotsRow = document.getElementById('slotsRow');
  TEAMS.forEach(team => {
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.team = team.id;
    slot.innerHTML = `
      <div class="slot-badge" id="badge-${team.id}">0</div>
      <svg class="slot-shield" viewBox="0 0 40 40" width="40" height="40"><use href="#${team.id}"></use></svg>
    `;
    slotsRow.appendChild(slot);
  });

  const scores = {};
  TEAMS.forEach(t => scores[t.id] = 0);

  function updateSlotUI(teamId){
    const badge = document.getElementById('badge-' + teamId);
    badge.textContent = scores[teamId];
    badge.classList.remove('pulse');
    void badge.offsetWidth;
    badge.classList.add('pulse');
  }

  function resetScores(){
    TEAMS.forEach(t => {
      scores[t.id] = 0;
      document.getElementById('badge-' + t.id).textContent = '0';
    });
  }

  /* =========================================================
     TORCEDORES (fãs recentes)
     ========================================================= */
  const fansListEl = document.getElementById('fansList');
  let fansList = [];

  function registerFan(user, teamId){
    const existingIndex = fansList.findIndex(f => f.user === user);
    if(existingIndex !== -1) fansList.splice(existingIndex, 1);
    fansList.unshift({ user, teamId });
    if(fansList.length > 8) fansList = fansList.slice(0, 8);
    renderFans();
  }

  function renderFans(){
    fansListEl.innerHTML = '';
    fansList.forEach(f => {
      const div = document.createElement('div');
      div.className = 'fan-item';
      div.textContent = `${f.user} → ${TEAM_NAME[f.teamId]}`;
      fansListEl.appendChild(div);
    });
  }

  /* =========================================================
     PLINKO — tabuleiro
     ========================================================= */
  const plinkoCanvas = document.getElementById('plinkoCanvas');
  const ctx = plinkoCanvas.getContext('2d');
  const PIN_ROWS = SLOTS - 1; // 9 fileiras para 10 slots

  let displayWidth = 0, displayHeight = 0, unitWidth = 0;
  let pins = [];
  let pinFlashes = [];
  let balls = [];

  function resizePlinko(){
    const rect = plinkoCanvas.getBoundingClientRect();
    displayWidth = rect.width;
    displayHeight = rect.height;
    unitWidth = displayWidth / SLOTS;
    const dpr = window.devicePixelRatio || 1;
    plinkoCanvas.width = displayWidth * dpr;
    plinkoCanvas.height = displayHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    generatePins();
  }

  function generatePins(){
    pins = [];
    const marginTop = displayHeight * 0.12;
    const marginBottom = displayHeight * 0.14;
    const usable = displayHeight - marginTop - marginBottom;
    for(let r = 0; r < PIN_ROWS; r++){
      const y = marginTop + (usable * (r + 1)) / (PIN_ROWS + 1);
      if(r % 2 === 0){
        for(let i = 0; i < SLOTS - 1; i++){
          pins.push({ x: (i + 1) * unitWidth, y });
        }
      } else {
        for(let i = 1; i < SLOTS - 1; i++){
          pins.push({ x: (i + 0.5) * unitWidth, y });
        }
      }
    }
  }

  function pixelX(colUnit){ return (colUnit + 0.5) * unitWidth; }

  function planBall(){
    let colUnit = (SLOTS - 1) / 2;
    const colUnits = [colUnit];
    for(let i = 0; i < PIN_ROWS; i++){
      colUnit += Math.random() < 0.5 ? -0.5 : 0.5;
      colUnits.push(colUnit);
    }
    const slotIndex = Math.max(0, Math.min(SLOTS - 1, Math.round(colUnits[colUnits.length - 1])));
    colUnits[colUnits.length - 1] = slotIndex;

    const marginTop = displayHeight * 0.06;
    const marginBottom = displayHeight * 0.03;
    const pinMarginTop = displayHeight * 0.12;
    const pinMarginBottom = displayHeight * 0.14;
    const usable = displayHeight - pinMarginTop - pinMarginBottom;

    const points = colUnits.map((cu, i) => {
      let y;
      if(i === 0) y = marginTop;
      else if(i === colUnits.length - 1) y = displayHeight - marginBottom;
      else y = pinMarginTop + (usable * i) / (PIN_ROWS + 1);
      return { x: pixelX(cu), y };
    });

    return { points, slotIndex };
  }

  function spawnBall(){
    const { points, slotIndex } = planBall();
    balls.push({
      points,
      slotIndex,
      start: performance.now(),
      duration: 1500 + Math.random() * 300,
      lastSeg: -1,
      trail: []
    });
  }

  function dropBalls(n){
    for(let i = 0; i < n; i++){
      setTimeout(() => spawnBall(), i * (160 + Math.random() * 140));
    }
  }

  function easeInOutQuad(t){ return t < 0.5 ? 2*t*t : -1 + (4 - 2*t) * t; }

  function drawPins(){
    pinFlashes = pinFlashes.filter(f => f.life > 0);
    pins.forEach(p => {
      ctx.beginPath();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.shadowColor = 'rgba(255,255,255,0.4)';
      ctx.shadowBlur = 4;
      ctx.arc(p.x, p.y, 3.2, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.shadowBlur = 0;
    pinFlashes.forEach(f => {
      ctx.beginPath();
      ctx.fillStyle = `rgba(255,215,106,${f.life/12})`;
      ctx.arc(f.x, f.y, 6*(1 - f.life/12) + 3, 0, Math.PI*2);
      ctx.fill();
      f.life--;
    });
  }

  function drawBall(x, y){
    ctx.save();
    ctx.beginPath();
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 6;
    ctx.arc(x, y, 6, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#111';
    [[-2,-2],[2,-1],[0,2]].forEach(([dx,dy]) => {
      ctx.beginPath();
      ctx.arc(x+dx, y+dy, 1, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.restore();
  }

  function drawTrail(trail){
    trail.forEach((p, i) => {
      const f = i / trail.length;
      ctx.beginPath();
      ctx.fillStyle = `rgba(255,255,255,${f*0.3})`;
      ctx.arc(p.x, p.y, 4*f, 0, Math.PI*2);
      ctx.fill();
    });
  }

  function landBall(b){
    const team = TEAMS[b.slotIndex];
    scores[team.id]++;
    updateSlotUI(team.id);
    const slotEl = document.querySelector(`.slot[data-team="${team.id}"]`);
    if(slotEl){
      const rect = slotEl.getBoundingClientRect();
      spawnParticles(rect.left + rect.width/2, rect.top, 18,
        ['#ffd76a','#4fd1ff','#ff6ec7','#6affa0','#ffffff'],
        { speed:6, gravity:0.25, life:50, size:5 });
    }
  }

  function plinkoLoop(now){
    ctx.clearRect(0, 0, displayWidth, displayHeight);
    drawPins();
    for(let i = balls.length - 1; i >= 0; i--){
      const b = balls[i];
      const segCount = b.points.length - 1;
      const t = (now - b.start) / b.duration;
      if(t >= 1){
        landBall(b);
        balls.splice(i, 1);
        continue;
      }
      const segF = t * segCount;
      const seg = Math.min(segCount - 1, Math.floor(segF));
      const localT = segF - seg;
      const p0 = b.points[seg], p1 = b.points[seg+1];
      const eased = easeInOutQuad(localT);
      const x = p0.x + (p1.x - p0.x) * eased;
      const y = p0.y + (p1.y - p0.y) * eased;
      if(seg !== b.lastSeg){
        b.lastSeg = seg;
        pinFlashes.push({ x: p0.x, y: p0.y, life: 12 });
      }
      b.trail.push({ x, y });
      if(b.trail.length > 6) b.trail.shift();
      drawTrail(b.trail);
      drawBall(x, y);
    }
    requestAnimationFrame(plinkoLoop);
  }

  window.addEventListener('resize', resizePlinko);
  resizePlinko();
  requestAnimationFrame(plinkoLoop);

  /* =========================================================
     PARTÍCULAS (confete, tela toda)
     ========================================================= */
  const pCanvas = document.getElementById('particles');
  const pCtx = pCanvas.getContext('2d');
  function resizeParticleCanvas(){ pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight; }
  resizeParticleCanvas();
  window.addEventListener('resize', resizeParticleCanvas);

  let particles = [];
  function spawnParticles(x, y, count, colors, opts = {}){
    for(let i = 0; i < count; i++){
      const angle = Math.random() * Math.PI * 2;
      const speed = (opts.speed || 6) * Math.random() + 2;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (opts.upBias || 3),
        gravity: opts.gravity !== undefined ? opts.gravity : 0.25,
        life: (opts.life || 50) + Math.random() * 20,
        maxLife: (opts.life || 50) + 20,
        size: (opts.size || 4) + Math.random() * 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.3
      });
    }
  }
  function particlesLoop(){
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    particles = particles.filter(p => p.life > 0);
    for(const p of particles){
      p.vy += p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotSpeed;
      p.life--;
      const alpha = Math.max(0, p.life / p.maxLife);
      pCtx.save();
      pCtx.globalAlpha = alpha;
      pCtx.translate(p.x, p.y);
      pCtx.rotate(p.rot);
      pCtx.fillStyle = p.color;
      pCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      pCtx.restore();
    }
    requestAnimationFrame(particlesLoop);
  }
  requestAnimationFrame(particlesLoop);

  /* =========================================================
     FOLLOW — celebração sutil
     ========================================================= */
  const followToast = document.getElementById('followToast');
  let followTimer;
  function celebrateFollow(user){
    followToast.textContent = `🎉 ${user} seguiu!`;
    followToast.classList.add('show');
    clearTimeout(followTimer);
    followTimer = setTimeout(() => followToast.classList.remove('show'), 2200);
    spawnParticles(window.innerWidth/2, 90, 20,
      ['#6affa0','#4fd1ff','#ffd76a','#ffffff'],
      { speed:5, gravity:0.2, life:45, size:5 });
  }

  /* =========================================================
     TRATAMENTO DOS EVENTOS
     Mesma função usada pelo WebSocket real e pelos botões de teste.
     ========================================================= */
  let likeAccumulator = 0;

  function handleEvent(evento){
    if(!evento || !evento.type) return;

    switch(evento.type){
      case 'COMMENT': {
        const teamId = detectTeam(evento.message || '');
        if(teamId) registerFan(evento.user || 'alguém', teamId);
        break;
      }
      case 'LIKE': {
        likeAccumulator += (evento.count || 1);
        let toDrop = 0;
        while(likeAccumulator >= 15){
          likeAccumulator -= 15;
          toDrop++;
        }
        if(toDrop > 0) dropBalls(toDrop);
        break;
      }
      case 'GIFT': {
        dropBalls(5);
        break;
      }
      case 'FOLLOW': {
        celebrateFollow(evento.user || 'alguém');
        break;
      }
      default:
        console.warn('Tipo de evento desconhecido:', evento);
    }
  }

  /* =========================================================
     CONEXÃO WEBSOCKET — reconecta a cada 5s se cair
     ========================================================= */
  function connect(){
    try{
      const ws = new WebSocket(WS_URL);
      ws.onopen = () => console.log('[Plinko dos Gigantes] conectado à Interactive Live');
      ws.onmessage = (msg) => {
        try{
          const evento = JSON.parse(msg.data);
          handleEvent(evento);
        }catch(e){
          console.error('[Plinko dos Gigantes] evento inválido recebido', e);
        }
      };
      ws.onclose = () => {
        console.log('[Plinko dos Gigantes] conexão fechada, tentando reconectar em 5s...');
        setTimeout(connect, 5000);
      };
      ws.onerror = (e) => console.error('[Plinko dos Gigantes] erro no WebSocket', e);
    }catch(e){
      console.error('[Plinko dos Gigantes] não foi possível conectar', e);
    }
  }
  connect();

  /* =========================================================
     BOTÕES DE TESTE
     ========================================================= */
  function simulateComment(teamHint, message){
    handleEvent({ type:'COMMENT', user: 'torcedor_' + Math.floor(Math.random()*100), message });
  }
  function simulateLike(){
    handleEvent({ type:'LIKE', user:'user_teste', count:15 });
  }
  function simulateGift(){
    const gifts = ['Rosa','Coração','Coroa','Diamante'];
    handleEvent({ type:'GIFT', user:'vip_' + Math.floor(Math.random()*100), gift: gifts[Math.floor(Math.random()*gifts.length)], amount:1 });
  }
  function simulateFollow(){
    handleEvent({ type:'FOLLOW', user:'nova_fa_' + Math.floor(Math.random()*100) });
  }

  const testToggle = document.getElementById('testToggle');
  const testButtons = document.getElementById('testButtons');
  testToggle.addEventListener('click', () => testButtons.classList.toggle('open'));
</script>
