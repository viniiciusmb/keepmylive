<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foguete até a Lua 🚀</title>
<style>
  :root{
    --bg-1:#04051a;
    --bg-2:#150934;
    --bg-3:#2b1259;
    --bg-4:#4a1d7a;
    --blue:#4fd1ff;
    --blue-glow: rgba(79,209,255,0.6);
    --purple:#a566ff;
    --gold:#ffd76a;
    --pink:#ff6ec7;
    --green:#6affa0;
    --text:#f2eeff;
    --text-dim: rgba(242,238,255,0.65);
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.15);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background: radial-gradient(circle at 50% 100%, var(--bg-4), var(--bg-3) 40%, var(--bg-2) 70%, var(--bg-1) 100%);
    color:var(--text);
    font-family: system-ui, "Segoe UI", Arial, sans-serif;
  }

  /* ---------- estrelas de fundo ---------- */
  .stars-layer{
    position:fixed; top:0; left:0; width:2px; height:2px;
    background:transparent; border-radius:50%; z-index:0;
  }
  .stars-layer.small{ animation: twinkle 3s ease-in-out infinite alternate; }
  .stars-layer.big{ width:3px; height:3px; animation: twinkle 4s ease-in-out infinite alternate-reverse; }
  @keyframes twinkle{ 0%{opacity:0.35;} 100%{opacity:1;} }

  /* ---------- HUD ---------- */
  .hud{
    position:fixed; top:20px; left:20px; z-index:5;
    font-family:"Courier New", monospace;
  }
  .hud-title{ font-size:12px; letter-spacing:3px; color:var(--blue); opacity:0.85; }
  .hud-fuel{ font-size:22px; font-weight:700; margin-top:4px; }
  #fuelReadout{ color:var(--gold); }

  /* ---------- cena central ---------- */
  .scene{
    position:relative; z-index:2; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
  }

  .track-wrap{
    position:relative;
    width:130px;
    height:64vh;
  }

  .moon{
    position:absolute; top:-72px; left:50%; transform:translateX(-50%);
    font-size:64px; z-index:3;
    filter: drop-shadow(0 0 20px var(--gold));
    animation: moonFloat 6s ease-in-out infinite;
  }
  @keyframes moonFloat{
    0%,100%{ transform:translateX(-50%) translateY(0); }
    50%{ transform:translateX(-50%) translateY(-10px); }
  }
  .moon.win{ animation: moonWin 0.8s ease-in-out infinite; }
  @keyframes moonWin{
    0%,100%{ filter: drop-shadow(0 0 20px var(--gold)); transform:translateX(-50%) scale(1); }
    50%{ filter: drop-shadow(0 0 45px var(--gold)); transform:translateX(-50%) scale(1.12); }
  }

  .track{
    position:absolute; inset:0;
    border-radius:65px;
    background:var(--glass);
    border:2px solid var(--glass-border);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 0 25px rgba(120,80,255,0.25);
    overflow:hidden;
    backdrop-filter: blur(4px);
  }

  .track-fill{
    position:absolute; bottom:0; left:0; width:100%; height:0%;
    background: linear-gradient(180deg, var(--blue), #1a7fae);
    box-shadow: 0 0 20px var(--blue-glow);
    transition: height 0.6s cubic-bezier(.2,.8,.2,1);
    border-radius: 0 0 65px 65px;
  }

  .rocket-wrap{
    position:absolute; left:50%; bottom:0%;
    transform: translate(-50%, 55%);
    transition: bottom 0.6s cubic-bezier(.2,.8,.2,1);
    z-index:4;
    display:flex; flex-direction:column; align-items:center;
  }

  .rocket{
    font-size:42px;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
    display:block;
  }

  .flame{
    width:14px; height:20px; margin-top:-8px;
    background: radial-gradient(circle, #fff176, #ff7b39 60%, transparent 80%);
    border-radius:50% 50% 60% 60%;
    opacity:0.85;
    animation: flameFlicker 0.25s infinite alternate;
    transform-origin: top center;
  }
  @keyframes flameFlicker{
    0%{ transform:scaleY(1) scaleX(1); }
    100%{ transform:scaleY(1.3) scaleX(0.8); }
  }
  .flame.boost{ animation: flameBoost 0.4s ease-out; }
  @keyframes flameBoost{
    0%{ transform:scaleY(2.2) scaleX(1.4); opacity:1; }
    100%{ transform:scaleY(1) scaleX(1); opacity:0.85; }
  }

  .shield{
    position:absolute; top:38%; left:50%;
    width:70px; height:70px;
    transform:translate(-50%,-50%) scale(0);
    border-radius:50%;
    border:3px solid var(--green);
    box-shadow:0 0 20px var(--green), inset 0 0 20px var(--green);
    opacity:0;
    transition: all 0.4s ease;
    pointer-events:none;
  }
  .shield.active{
    transform:translate(-50%,-50%) scale(1); opacity:1;
    animation: shieldPulse 1.2s ease-in-out infinite;
  }
  @keyframes shieldPulse{
    0%,100%{ box-shadow:0 0 15px var(--green), inset 0 0 15px var(--green); }
    50%{ box-shadow:0 0 30px var(--green), inset 0 0 25px var(--green); }
  }

  .speech-bubble{
    position:absolute; bottom:100%; left:50%;
    transform:translate(-50%, 10px);
    margin-bottom:16px;
    max-width:220px;
    background:rgba(255,255,255,0.95); color:#1a1040;
    padding:10px 14px; border-radius:16px;
    font-size:13px; font-weight:600; text-align:center;
    opacity:0; pointer-events:none;
    transition: all 0.3s ease;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
  }
  .speech-bubble::after{
    content:''; position:absolute; top:100%; left:50%;
    transform:translateX(-50%);
    border:8px solid transparent; border-top-color:rgba(255,255,255,0.95);
  }
  .speech-bubble.show{ opacity:1; transform:translate(-50%,0); }

  /* ---------- log de eventos ---------- */
  .event-log{
    position:fixed; bottom:20px; left:20px; width:280px;
    display:flex; flex-direction:column-reverse; gap:6px;
    font-family:"Courier New", monospace; font-size:12px;
    z-index:5; pointer-events:none;
  }
  .event-log-item{
    background:rgba(10,6,30,0.6);
    border-left:3px solid var(--blue);
    padding:6px 10px; border-radius:4px;
    color:var(--text-dim);
    animation: logIn 0.3s ease;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  @keyframes logIn{ from{opacity:0; transform:translateX(-10px);} to{opacity:1; transform:translateX(0);} }

  /* ---------- banner de follow ---------- */
  .follow-banner{
    position:fixed; top:60px; left:50%;
    transform:translate(-50%,-20px);
    background:linear-gradient(135deg, var(--green), #2fa876);
    color:#04241a; font-weight:800;
    padding:12px 24px; border-radius:30px; font-size:16px;
    opacity:0; box-shadow:0 6px 25px rgba(106,255,160,0.4);
    transition: all 0.4s ease; z-index:6; pointer-events:none;
  }
  .follow-banner.show{ opacity:1; transform:translate(-50%,0); }

  /* ---------- celebração ---------- */
  .celebration{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(5,3,20,0.55);
    opacity:0; pointer-events:none;
    transition: opacity 0.5s ease; z-index:8;
  }
  .celebration.show{ opacity:1; }
  .celebration-text{
    font-family:"Arial Black", Impact, sans-serif;
    font-size:clamp(28px,6vw,64px);
    color:var(--gold);
    text-shadow:0 0 30px var(--gold), 0 0 60px var(--pink);
    text-align:center; letter-spacing:2px;
    transform:scale(0.7);
  }
  .celebration.show .celebration-text{
    animation: celebPop 0.5s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes celebPop{ to{ transform:scale(1); } }

  /* ---------- canvas de partículas ---------- */
  #particles{ position:fixed; inset:0; z-index:7; pointer-events:none; }

  /* ---------- painel de teste ---------- */
  .test-panel{ position:fixed; bottom:16px; right:16px; z-index:10; }
  .test-toggle{
    width:38px; height:38px; border-radius:50%;
    border:1px solid var(--glass-border);
    background:rgba(20,10,45,0.75); color:var(--text);
    font-size:16px; cursor:pointer; backdrop-filter:blur(6px);
  }
  .test-buttons{
    position:absolute; bottom:46px; right:0;
    display:flex; flex-direction:column; gap:6px;
    background:rgba(10,6,30,0.88);
    border:1px solid var(--glass-border); border-radius:10px;
    padding:10px;
    opacity:0; pointer-events:none;
    transform:translateY(10px);
    transition:all 0.25s ease;
    backdrop-filter:blur(8px);
  }
  .test-buttons.open{ opacity:1; pointer-events:auto; transform:translateY(0); }
  .test-buttons button{
    background:var(--glass); border:1px solid var(--glass-border); color:var(--text);
    padding:8px 12px; border-radius:6px; font-size:12px; cursor:pointer;
    white-space:nowrap; text-align:left;
  }
  .test-buttons button:hover{ background:rgba(255,255,255,0.15); }
  .test-label{ font-size:10px; color:var(--text-dim); letter-spacing:1px; margin-bottom:2px; }

  @media (max-width:480px){
    .track-wrap{ width:90px; height:52vh; }
    .rocket{ font-size:32px; }
    .moon{ font-size:46px; top:-56px; }
    .hud-fuel{ font-size:18px; }
    .event-log{ width:190px; font-size:10.5px; }
  }
</style>
</head>
<body>

  <div class="stars-layer small" id="starsSmall"></div>
  <div class="stars-layer big" id="starsBig"></div>
  <canvas id="particles"></canvas>

  <div class="hud">
    <div class="hud-title">MISSÃO LUA</div>
    <div class="hud-fuel">COMBUSTÍVEL <span id="fuelReadout">0%</span></div>
  </div>

  <div class="scene">
    <div class="track-wrap">
      <div class="moon" id="moon">🌕</div>
      <div class="track">
        <div class="track-fill" id="trackFill"></div>
      </div>
      <div class="rocket-wrap" id="rocketWrap">
        <div class="speech-bubble" id="speechBubble"></div>
        <div class="shield" id="shield"></div>
        <div class="rocket">🚀</div>
        <div class="flame" id="flame"></div>
      </div>
    </div>
  </div>

  <div class="event-log" id="eventLog"></div>
  <div class="follow-banner" id="followBanner"></div>

  <div class="celebration" id="celebration">
    <div class="celebration-text">🚀 Chegamos à Lua! 🌕</div>
  </div>

  <div class="test-panel">
    <button class="test-toggle" id="testToggle" title="Mostrar/esconder testes">⚙</button>
    <div class="test-buttons open" id="testButtons">
      <div class="test-label">SIMULAR EVENTOS</div>
      <button onclick="simulateLike()">👍 Simular Like</button>
      <button onclick="simulateComment()">💬 Simular Comentário</button>
      <button onclick="simulateGift()">🎁 Simular Presente</button>
      <button onclick="simulateFollow()">➕ Simular Seguidor</button>
    </div>
  </div>

<script>
  /* =========================================================
     CONFIGURAÇÃO — troque pelos seus valores reais
     ========================================================= */
  const params = new URLSearchParams(window.location.search);
  const USERNAME = params.get('username') || 'SEU_USERNAME_AQUI';
  const KEY = params.get('key') || 'SUA_CHAVE_AQUI';
  const WS_URL = `wss://api.interactivelive.online:8443?username=${USERNAME}&key=${KEY}`;

  /* Balanceamento — ajuste esses números à vontade */
  const FUEL_PER_LIKE_COUNT = (count) => Math.max(0.5, (count || 1) / 20);
  const FUEL_PER_COMMENT = 6;
  const FUEL_PER_GIFT_UNIT = 8;
  const SHIELD_DURATION = 6000;
  const COMMENT_DURATION = 3000;
  const FOLLOW_BANNER_DURATION = 3500;
  const WIN_HOLD = 3000;

  /* =========================================================
     ESTRELAS DE FUNDO
     ========================================================= */
  function generateStars(count){
    const shadows = [];
    for(let i=0;i<count;i++){
      shadows.push(`${(Math.random()*100).toFixed(2)}vw ${(Math.random()*100).toFixed(2)}vh #fff`);
    }
    return shadows.join(',');
  }
  document.getElementById('starsSmall').style.boxShadow = generateStars(130);
  document.getElementById('starsBig').style.boxShadow = generateStars(45);

  /* =========================================================
     ELEMENTOS DO JOGO
     ========================================================= */
  const trackFill = document.getElementById('trackFill');
  const rocketWrap = document.getElementById('rocketWrap');
  const fuelReadout = document.getElementById('fuelReadout');
  const flame = document.getElementById('flame');
  const shield = document.getElementById('shield');
  const speechBubble = document.getElementById('speechBubble');
  const followBanner = document.getElementById('followBanner');
  const eventLog = document.getElementById('eventLog');
  const celebration = document.getElementById('celebration');
  const moon = document.getElementById('moon');

  let fuel = 0;
  let isCelebrating = false;
  let bubbleTimer, shieldTimer, followTimer, flameTimer;

  function updateFuelUI(){
    trackFill.style.height = fuel + '%';
    rocketWrap.style.bottom = fuel + '%';
    fuelReadout.textContent = Math.round(fuel) + '%';
  }

  function boostFlame(){
    flame.classList.remove('boost');
    void flame.offsetWidth; // reinicia a animação
    flame.classList.add('boost');
  }

  function addFuel(amount){
    if(isCelebrating) return;
    fuel = Math.min(100, fuel + amount);
    updateFuelUI();
    boostFlame();
    if(fuel >= 100){
      celebrate();
    }
  }

  function showComment(user, message){
    speechBubble.textContent = `${user}: ${message}`;
    speechBubble.classList.add('show');
    clearTimeout(bubbleTimer);
    bubbleTimer = setTimeout(() => speechBubble.classList.remove('show'), COMMENT_DURATION);
  }

  function showShield(){
    shield.classList.add('active');
    clearTimeout(shieldTimer);
    shieldTimer = setTimeout(() => shield.classList.remove('active'), SHIELD_DURATION);
  }

  function showFollowBanner(user){
    followBanner.textContent = `🎉 ${user} seguiu!`;
    followBanner.classList.add('show');
    clearTimeout(followTimer);
    followTimer = setTimeout(() => followBanner.classList.remove('show'), FOLLOW_BANNER_DURATION);
  }

  function logEvent(text){
    const item = document.createElement('div');
    item.className = 'event-log-item';
    item.textContent = text;
    eventLog.appendChild(item);
    while(eventLog.children.length > 5){
      eventLog.removeChild(eventLog.firstChild);
    }
    setTimeout(() => item.remove(), 8000);
  }

  function celebrate(){
    isCelebrating = true;
    moon.classList.add('win');
    celebration.classList.add('show');
    spawnWinConfetti();
    setTimeout(() => {
      celebration.classList.remove('show');
      moon.classList.remove('win');
      fuel = 0;
      updateFuelUI();
      isCelebrating = false;
    }, WIN_HOLD);
  }

  /* =========================================================
     PARTÍCULAS (confete)
     ========================================================= */
  const pCanvas = document.getElementById('particles');
  const pCtx = pCanvas.getContext('2d');
  function resizeCanvas(){ pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight; }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  let particles = [];
  function spawnParticles(x, y, count, colors, opts = {}){
    for(let i=0;i<count;i++){
      const angle = Math.random() * Math.PI * 2;
      const speed = (opts.speed || 6) * Math.random() + 2;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (opts.upBias || 4),
        gravity: opts.gravity !== undefined ? opts.gravity : 0.25,
        life: (opts.life || 60) + Math.random() * 20,
        maxLife: (opts.life || 60) + 20,
        size: (opts.size || 4) + Math.random() * 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.3
      });
    }
  }

  function updateParticles(){
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    particles = particles.filter(p => p.life > 0);
    for(const p of particles){
      p.vy += p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotSpeed;
      p.life--;
      const alpha = Math.max(0, p.life / p.maxLife);
      pCtx.save();
      pCtx.globalAlpha = alpha;
      pCtx.translate(p.x, p.y);
      pCtx.rotate(p.rot);
      pCtx.fillStyle = p.color;
      pCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      pCtx.restore();
    }
    requestAnimationFrame(updateParticles);
  }
  requestAnimationFrame(updateParticles);

  function spawnGiftConfetti(amount){
    const rect = rocketWrap.getBoundingClientRect();
    const x = rect.left + rect.width / 2;
    const y = rect.top;
    const count = Math.min(140, 20 + amount * 15);
    spawnParticles(x, y, count, ['#ff6ec7','#ffd76a','#4fd1ff','#a566ff','#6affa0'], { speed:8, gravity:0.3, life:70, size:6 });
  }

  function spawnWinConfetti(){
    for(let burst=0; burst<3; burst++){
      setTimeout(() => {
        for(let i=0;i<6;i++){
          const x = Math.random() * window.innerWidth;
          spawnParticles(x, -10, 15, ['#ffd76a','#4fd1ff','#ff6ec7','#a566ff','#ffffff'], { speed:4, gravity:0.15, life:150, upBias:-2, size:6 });
        }
      }, burst * 400);
    }
  }

  /* =========================================================
     TRATAMENTO DOS EVENTOS
     Essa é a MESMA função usada pelo WebSocket real e pelos
     botões de teste — assim o comportamento é sempre idêntico.
     ========================================================= */
  function handleEvent(evento){
    if(!evento || !evento.type) return;

    switch(evento.type){
      case 'LIKE': {
        const count = evento.count || 1;
        addFuel(FUEL_PER_LIKE_COUNT(count));
        logEvent(`👍 ${evento.user || 'alguém'} curtiu x${count}`);
        break;
      }
      case 'COMMENT': {
        addFuel(FUEL_PER_COMMENT);
        showComment(evento.user || 'alguém', evento.message || '');
        logEvent(`💬 ${evento.user || 'alguém'}: ${evento.message || ''}`);
        break;
      }
      case 'GIFT': {
        const amount = evento.amount || 1;
        addFuel(amount * FUEL_PER_GIFT_UNIT);
        spawnGiftConfetti(amount);
        logEvent(`🎁 ${evento.user || 'alguém'} enviou ${evento.gift || 'presente'} x${amount}`);
        break;
      }
      case 'FOLLOW': {
        showShield();
        showFollowBanner(evento.user || 'alguém');
        logEvent(`➕ ${evento.user || 'alguém'} seguiu!`);
        break;
      }
      default:
        console.warn('Tipo de evento desconhecido:', evento);
    }
  }

  /* =========================================================
     CONEXÃO WEBSOCKET
     ========================================================= */
  function connect(){
    try{
      const ws = new WebSocket(WS_URL);
      ws.onopen = () => console.log('[Foguete até a Lua] conectado à Interactive Live');
      ws.onmessage = (msg) => {
        try{
          const evento = JSON.parse(msg.data);
          handleEvent(evento);
        }catch(e){
          console.error('[Foguete até a Lua] evento inválido recebido', e);
        }
      };
      ws.onclose = () => {
        console.log('[Foguete até a Lua] conexão fechada, tentando reconectar em 5s...');
        setTimeout(connect, 5000);
      };
      ws.onerror = (e) => console.error('[Foguete até a Lua] erro no WebSocket', e);
    }catch(e){
      console.error('[Foguete até a Lua] não foi possível conectar', e);
    }
  }
  connect(); // comente esta linha se não quiser tentar conectar durante os testes

  /* =========================================================
     BOTÕES DE TESTE
     ========================================================= */
  function simulateLike(){
    handleEvent({ type:'LIKE', user:'usuario_teste', count: Math.floor(Math.random()*30)+5 });
  }
  function simulateComment(){
    const msgs = ['Vai foguete! 🚀','Bora pra lua!','Que jogo legal!','Consegue chegar lá!','Arraaasa!'];
    handleEvent({ type:'COMMENT', user:'fa_' + Math.floor(Math.random()*100), message: msgs[Math.floor(Math.random()*msgs.length)] });
  }
  function simulateGift(){
    const gifts = ['Rosa','Coração','Foguete','Coroa','Diamante'];
    handleEvent({ type:'GIFT', user:'vip_' + Math.floor(Math.random()*100), gift: gifts[Math.floor(Math.random()*gifts.length)], amount: Math.floor(Math.random()*5)+1 });
  }
  function simulateFollow(){
    handleEvent({ type:'FOLLOW', user:'novo_seguidor_' + Math.floor(Math.random()*100) });
  }

  const testToggle = document.getElementById('testToggle');
  const testButtons = document.getElementById('testButtons');
  testToggle.addEventListener('click', () => testButtons.classList.toggle('open'));

  updateFuelUI();
</script>
</body>
</html>
